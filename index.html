    <!-- SPA redirect handler for GitHub Pages 404 -->
    <script>
      (function(){
        var q = window.location.search;
        if (q.length > 1) {
          var decoded = q.slice(1).split("&").map(function(s){ return s.replace(/~and~/g, "&"); }).join("?");
          if (decoded && !decoded.includes("=")) {
            window.history.replaceState(null, null, "/" + decoded + window.location.hash);
          }
        }
      })();
    </script>
